name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev wget curl

    - name: Try Dynamic Buildozer Versions (If-Elif Loop)
      run: |
        pip install --upgrade pip
        
        echo "=== TRYING STRATEGY 1: Pinned Stable Buildozer ==="
        if pip install buildozer==1.5.0 "cython<3.0" virtualenv; then
          echo "Strategy 1 Installed Successfully!"
        else
          echo "Strategy 1 Failed! Switching to Strategy 2..."
          
          echo "=== TRYING STRATEGY 2: Modern Stable Buildozer ==="
          if pip install buildozer==1.6.0 "cython<3.0" virtualenv; then
            echo "Strategy 2 Installed Successfully!"
          else
            echo "Strategy 2 Failed! Switching to Fallback Strategy 3..."
            
            echo "=== TRYING STRATEGY 3: Latest Combined Tools ==="
            pip install --upgrade buildozer cython virtualenv
          fi
        fi

    - name: Compile Android APK
      run: |
        # Safely clean old failed caches before compiling
        rm -rf .buildozer/
        yes | buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: sse-vault-app
        path: bin/*.apk
