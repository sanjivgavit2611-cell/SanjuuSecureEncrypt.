name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Android APK with Buildozer
      uses: subzeroic/buildozer-action@v2
      with:
        command: buildozer android debug
        repository_root: .
    - uses: actions/upload-artifact@v4
      with:
        name: sse-vault-app
        path: bin/*.apk
