name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev wget curl

    - name: Install Stable Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 "cython<3.0" virtualenv

    - name: Clone and Patch python-for-android Toolchain
      run: |
        cd ..
        git clone --branch master --single-branch https://github.com/kivy/python-for-android.git custom_p4a
        cd custom_p4a
        sed -i "s/version = '3.14.2'/version = '3.11.9'/g" pythonforandroid/recipes/python3/__init__.py || true
        sed -i "s/version = '3.14.2'/version = '3.11.9'/g" pythonforandroid/recipes/hostpython3/__init__.py || true

    - name: Compile Android APK
      run: |
        rm -rf .buildozer/
        yes | buildozer android debug
    
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: sse-vault-app
        path: bin/*.apk
