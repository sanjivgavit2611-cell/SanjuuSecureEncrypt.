name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev wget curl

    - name: Install Stable Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 "cython<3.0" virtualenv

    - name: Clone and Patch python-for-android Toolchain (Regex Lock)
      run: |
        cd ..
        git clone --branch master --single-branch https://github.com/kivy/python-for-android.git custom_p4a
        cd custom_p4a
        python3 -c "
        import re
        for recipe in ['python3', 'hostpython3']:
            p = f'pythonforandroid/recipes/{recipe}/__init__.py'
            raw = open(p).read()
            patched = re.sub(r'version\s*=\s*[\"\'][^\"\']+[\"\']', 'version = \"3.11.9\"', raw)
            open(p, 'w').write(patched)
        "

    - name: Compile Android APK
      run: |
        rm -rf .buildozer/
        yes | buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: sse-vault-app
        path: bin/*.apk
