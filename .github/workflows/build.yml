name: Build APK
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Exact Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11.6'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev wget curl

    - name: Force Exact Stable Tools
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 Cython==0.29.33 virtualenv setuptools

    - name: Lock python-for-android to Stable Tag
      run: |
        git clone https://github.com/kivy/python-for-android.git
        cd python-for-android
        git checkout tags/v2024.01.21 -b stable-build-branch
        echo "Locked p4a securely!"

    - name: Build Android APK
      run: |
        rm -rf .buildozer/
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SSE-Vault-APK
        path: bin/*.apk
