name: Build APK
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev wget curl

    - name: Install Stable Buildozer & Cython
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0 "cython<3.0" virtualenv

    - name: Clone and Prepare Stable python-for-android
      run: |
        # Hum khud stable version clone kar rahe hain bina buildozer ke jhanjhat ke
        git clone https://github.com/kivy/python-for-android.git p4a_src
        cd p4a_src
        git checkout v2024.04.18 || git checkout $(git tag -l "v2024.*" | tail -n 1)
        echo "Successfully locked to stable p4a version:"
        git log -1 --oneline
        cd ..
        # buildozer.spec mein dynamic absolute path inject karna
        sed -i "s|p4a.dir = .*|p4a.dir = $GITHUB_WORKSPACE/p4a_src|g" buildozer.spec

    - name: Compile Android APK
      run: |
        rm -rf .buildozer/
        yes | buildozer android debug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: sse-vault-app
        path: bin/*.apk
