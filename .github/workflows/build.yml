name: Build APK
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Stable Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies & Rust (For Crypto)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libffi-dev git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev wget curl rustc cargo

    - name: The Ultimate Pinned Installation
      run: |
        pip install --upgrade pip
        # Yahan humne Buildozer, Cython aur P4A teeno ko explicitly lock kar diya hai
        pip install buildozer==1.5.0 Cython==0.29.33 virtualenv setuptools python-for-android==2024.1.21

    - name: Build Android APK
      run: |
        rm -rf .buildozer/
        yes | buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SSE-Vault-APK
        path: bin/*.apk
